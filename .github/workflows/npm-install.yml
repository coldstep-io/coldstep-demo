name: "Demo: npm install"
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday

jobs:
  npm-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: coldstep-io/coldstep@v0.3.0
        with:
          mode: detect
          report: step-summary

      - name: Install express + aws-sdk
        run: |
          npm install express
          npm install @aws-sdk/client-s3
