name: "Demo: cargo install"
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

jobs:
  cargo-demo:
    runs-on: ubuntu-latest
    steps:
      - id: coldstep
        uses: coldstep-io/coldstep@v0.4.0
        with:
          mode: detect
          detect-profile: enhanced
          fail-on-error: true

      - name: Install ripgrep via cargo
        run: cargo install ripgrep

      - name: Suggested allowlist
        if: always()
        run: |
          {
            echo '## Suggested allowlist'
            echo ''
            echo 'Paste the lines below into the action `allow:` input to lock this workflow down in defend mode.'
            echo ''
            echo '```'
            echo "${{ steps.coldstep.outputs.suggested-allow }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coldstep telemetry
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coldstep-${{ github.job }}-${{ github.run_id }}
          path: |
            .coldstep-events.jsonl
            .coldstep-detect.md
            .coldstep-telemetry.json
          include-hidden-files: true
          retention-days: 14
