name: "Demo: cargo install"
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

jobs:
  cargo-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: coldstep-io/coldstep@v0.3.0
        with:
          mode: detect
          report: step-summary

      - name: Install ripgrep via cargo
        run: cargo install ripgrep
