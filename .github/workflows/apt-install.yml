name: "Demo: apt-get install"
on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'

jobs:
  apt-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: coldstep-io/coldstep@v0.3.0
        with:
          mode: detect
          report: step-summary

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
